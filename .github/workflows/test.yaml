name: Test

on:
  push:
  pull_request:

jobs:
  gotchi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Test gotchi module
        run: go test ./...

  reference-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Verify generated reference app
        run: |
          cd examples/reference-app
          go test ./...

  migration-regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gotchi_regression
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gotchi_regression"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Run migration regression check
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/gotchi_regression?sslmode=disable
        run: ./scripts/migration-regression.sh
